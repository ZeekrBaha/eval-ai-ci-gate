name: ci

# This repo dogfoods its own gate. Offline, no secrets: lint + types + the full
# test suite, then the release gate against bundled fixtures — green on the passing
# scorecard, plus the BLOCKED money-shot shown informationally.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync

      - name: Lint + types + tests
        run: make check

      - name: Release gate — passing scorecard (must PASS, exit 0)
        run: make gate

      - name: Release gate — show the BLOCKED money-shot (informational)
        run: make gate-fail

  # Installs the package the same way the composite action does (with the notify extra)
  # and proves the notifier import path works in a clean tool environment — the runtime
  # path that unit tests, running under dev deps, cannot catch.
  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install with the notify extra (the runtime path the Action uses)
        run: |
          uv venv
          uv pip install ".[notify]"
      - name: Prove the CLI runs and the notifier deps import
        run: |
          uv run validate-scorecard --scorecard tests/fixtures/pass.json
          uv run python -c "import requests, gate.notify; print('notify import OK')"
